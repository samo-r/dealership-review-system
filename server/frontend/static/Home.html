<html>
  <head>
    <title>Autocars UG</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: normal;
        color: #0f172a;
        background: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
      }

      header {
        background: #0c9;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0.05em;
      }

      .nav-links {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .nav-link,
      .homepage_links {
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
      }

      .nav-link:hover,
      .homepage_links:hover {
        text-decoration: underline;
      }

      .hero-card {
        max-width: 760px;
        margin: 3rem auto;
        background: white;
        border-radius: 1.5rem;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }

      .hero-card img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      .hero-content {
        padding: 2rem;
        text-align: center;
      }

      .hero-title {
        margin: 0;
        font-size: 2.25rem;
        line-height: 1.1;
        color: #0f172a;
      }

      .hero-text {
        margin: 1rem auto 1.75rem;
        max-width: 34rem;
        color: #475569;
        font-size: 1rem;
        line-height: 1.75;
      }

      .hero-actions {
        display: inline-flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .button-primary,
      .button-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.95rem 1.75rem;
        border-radius: 9999px;
        border: none;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      .button-primary {
        background: #0c9;
        color: white;
      }

      .button-secondary {
        background: rgba(15, 23, 42, 0.04);
        color: #0f172a;
      }

      .button-primary:hover,
      .button-secondary:hover {
        opacity: 0.95;
      }

      .footer-note {
        margin-top: 4rem;
        text-align: center;
        color: #64748b;
        font-size: 0.95rem;
      }
    </style>
    <script>
      const logout = async () => {
        const logout_url = window.location.origin + "/djangoapp/logout/";
        const res = await fetch(logout_url, { method: "GET" });
        const json = await res.json();

        if (json) {
          const username = sessionStorage.getItem("username");
          sessionStorage.removeItem("username");
          alert("Logging out " + username + "...");
          window.location.href = window.location.origin;
        } else {
          alert("The user could not be logged out.");
        }
      };

      const checkSession = () => {
        const curr_user = sessionStorage.getItem("username");
        const loginLogout = document.getElementById("loginlogout");

        if (curr_user) {
          loginLogout.innerHTML =
            '<span class="homepage_links">' +
            curr_user +
            '</span>' +
            '<a class="homepage_links" onclick="logout()" href="#">Logout</a>';
        } else {
          loginLogout.innerHTML =
            '<a class="homepage_links" href="/login">Login</a>' +
            '<a class="homepage_links" href="/register">Register</a>';
        }
      };
    </script>
  </head>
  <body onload="checkSession()">
    <header>
      <h1 class="brand">Autocars UG</h1>
      <div class="nav-links">
        <a class="nav-link" href="/home">Home</a>
        <a class="nav-link" href="/dealers">Dealers</a>
        <a class="nav-link" href="/about">About Us</a>
        <a class="nav-link" href="/contact">Contact Us</a>
        <div id="loginlogout"></div>
      </div>
    </header>

    <div class="hero-card">
      <img src="static/car_dealership.jpg" alt="Car dealership" />
      <div class="hero-content">
        <h2 class="hero-title">Find the right dealer for your next ride.</h2>
        <p class="hero-text">
          Autocars UG makes it easy to compare trusted dealerships, read customer reviews, and post your own experience.
        </p>
        <div class="hero-actions">
          <a class="button-primary" href="/dealers">Browse dealers</a>
          <a class="button-secondary" href="/register">Create an account</a>
        </div>
      </div>
    </div>

    <p class="footer-note">Built for trusted dealership reviews by Autocars UG.</p>
  </body>
</html>
