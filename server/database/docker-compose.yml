services:
  # Mongodb service
  mongo_db:
    container_name: db_container
    image: mongo:latest
    ports:
      - 27017:27017
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  redis:
    container_name: redis_container
    image: redis:7-alpine
    ports:
      - 6379:6379
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # Node api service — built from local Dockerfile (do not pull from Docker Hub)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nodeapp
    ports:
      - "${PORT:-3030}:${PORT:-3030}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3030}
      MONGODB_URI: ${MONGODB_URI_DOCKER}
      DB_NAME: ${DB_NAME}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SEED_ON_START: ${SEED_ON_START:-true}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CHASSIS_ENCRYPTION_KEY: ${CHASSIS_ENCRYPTION_KEY}
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3030/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      mongo_db:
        condition: service_healthy

  sentiment:
    container_name: sentiment_container
    build:
      context: ../djangoapp/microservices
      dockerfile: Dockerfile
    environment:
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      FLASK_HOST: ${FLASK_HOST:-0.0.0.0}
      FLASK_PORT: ${FLASK_PORT:-5000}
    ports:
      - "${SENTIMENT_PORT:-5000}:5000"
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  sentiment_worker:
    container_name: sentiment_worker_container
    build:
      context: ../djangoapp/microservices
      dockerfile: worker.Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      backend_url: ${BACKEND_URL_DOCKER:-http://api:3030}
      sentiment_analyzer_url: ${SENTIMENT_ANALYZER_URL_DOCKER:-http://sentiment:5000}
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      sentiment:
        condition: service_healthy

volumes:
  mongo_data: {}
